name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.3"
          cache: true

      - name: Cache GIAB fixtures
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/binest-fixtures/giab
          key: giab-fixtures-${{ hashFiles('testdata/giab/manifest.tsv') }}

      - name: Fetch GIAB fixtures
        run: make fixtures-fetch

      - name: Test real GIAB fixtures
        run: make test-real

      - name: Check formatting
        run: make fmt-check

      - name: Check module tidiness
        run: make tidy-check

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check git size guardrails
        run: make git-size-check

      - name: Vulnerability scan
        run: go tool govulncheck ./...

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Build
        run: make build
