name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Cache GIAB fixtures
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .cache/binest-fixtures/giab
          key: giab-fixtures-${{ hashFiles('testdata/giab/manifest.tsv') }}

      - name: Fetch GIAB fixtures
        run: make fixtures-fetch

      - name: Test real GIAB fixtures
        run: make test-real

      - name: Check formatting
        run: make fmt-check

      - name: Check module tidiness
        run: make tidy-check

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check git size guardrails
        run: make git-size-check

      - name: Vulnerability scan
        run: go tool govulncheck ./...

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Build
        run: make build
